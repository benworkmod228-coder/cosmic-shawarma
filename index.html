<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ben's Setup Tycoon</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

#ui{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

#shop{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.8);
padding:10px;
display:flex;
overflow-x:auto;
}

.item{
background:#222;
border-radius:10px;
padding:10px;
margin:5px;
min-width:120px;
text-align:center;
}

button{
padding:5px;
border:none;
background:#00c3ff;
border-radius:5px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="ui">

<div>⚡ Очки: <span id="points">0</span></div>
<div>⭐ XP: <span id="xp">0</span></div>

</div>


<div id="shop">

<div class="item">
🎧 Наушники<br>
<button onclick="buy('headphones',100)">100</button>
</div>

<div class="item">
🖥 Монитор<br>
<button onclick="buy('monitor',200)">200</button>
</div>

<div class="item">
⌨ Клавиатура<br>
<button onclick="buy('keyboard',300)">300</button>
</div>

<div class="item">
🪑 Кресло<br>
<button onclick="buy('chair',400)">400</button>
</div>

<div class="item">
🧸 Декор<br>
<button onclick="buy('decor',600)">600</button>
</div>

</div>


<script>

let scene = new THREE.Scene()
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
let renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z = 5

let light = new THREE.PointLight(0xffffff,1)
light.position.set(10,10,10)
scene.add(light)

let points=0
let xp=0
let clickPower=1

let player
let headphones

function createPlayer(){

let geo = new THREE.BoxGeometry(1,2,1)
let mat = new THREE.MeshStandardMaterial({color:0x00ffcc})

player = new THREE.Mesh(geo,mat)

scene.add(player)

}

function createChair(){

let geo = new THREE.BoxGeometry(1.5,0.5,1.5)
let mat = new THREE.MeshStandardMaterial({color:0x555555})

let chair = new THREE.Mesh(geo,mat)

chair.position.y = -1.5

scene.add(chair)

}

function createDesk(){

let geo = new THREE.BoxGeometry(3,0.3,1.5)
let mat = new THREE.MeshStandardMaterial({color:0x222222})

let desk = new THREE.Mesh(geo,mat)

desk.position.y = -0.5
desk.position.z = -1

scene.add(desk)

}

function createPC(){

let geo = new THREE.BoxGeometry(0.7,1,0.7)
let mat = new THREE.MeshStandardMaterial({color:0x111111})

let pc = new THREE.Mesh(geo,mat)

pc.position.z = -1
pc.position.x = 1

scene.add(pc)

}

function buy(item,cost){

if(points<cost) return

points-=cost

if(item==="headphones"){

let geo = new THREE.TorusGeometry(0.6,0.1,16,100)
let mat = new THREE.MeshStandardMaterial({color:0xff0000})

headphones = new THREE.Mesh(geo,mat)

headphones.position.y=1

player.add(headphones)

}

if(item==="monitor"){

let geo = new THREE.BoxGeometry(1.2,0.8,0.1)
let mat = new THREE.MeshStandardMaterial({color:0x0000ff})

let monitor = new THREE.Mesh(geo,mat)

monitor.position.z=-1
monitor.position.y=0.3

scene.add(monitor)

}

if(item==="chair"){

createChair()

}

update()

}

function clickGame(){

points+=clickPower
xp+=1

update()

}

function update(){

document.getElementById("points").innerText=Math.floor(points)
document.getElementById("xp").innerText=xp

}

window.addEventListener("click",clickGame)

function animate(){

requestAnimationFrame(animate)

player.rotation.y +=0.01

renderer.render(scene,camera)

}

createPlayer()
createDesk()
createPC()

animate()

</script>

</body>
</html>
